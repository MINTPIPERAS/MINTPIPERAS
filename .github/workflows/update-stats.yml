name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&hide_border=true&bg_color=FFFBF7&title_color=8EC5A7&text_color=7A8B9E&border_radius=12&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - code-tape
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=code-tape&hide_border=true&bg_color=FFFBF7&title_color=8EC5A7&text_color=7A8B9E&icon_color=8EC5A7&border_radius=12
          path: profile/pin-code-tape.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - PIPERAS-BLOG
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=PIPERAS-BLOG&hide_border=true&bg_color=FFFBF7&title_color=8EC5A7&text_color=7A8B9E&icon_color=8EC5A7&border_radius=12
          path: profile/pin-PIPERAS-BLOG.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
